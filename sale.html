<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Phi Long Auto - Luong SALE (NVKD)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700;800&display=swap">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
--blu-500:#1E4FB8;--blu-600:#173E94;--blu-700:#122F71;--blu-50:#EBF1FB;--blu-100:#D2DFF5;
--yel-500:#FFC400;--yel-300:#FFDC4C;--yel-50:#FFFAE0;--yel-700:#A67D00;
--ink-50:#F4F6F8;--ink-100:#E6EAEF;--ink-200:#CFD5DD;--ink-300:#AAB3BE;
--ink-400:#7C8693;--ink-500:#535C69;--ink-900:#0B0E13;
--grn:#16A34A;--grn-bg:#E7F8ED;--red:#DC2626;--red-bg:#FCEAEA;
--card:#fff;--bd:var(--ink-100);--bd2:var(--ink-200);--fg:var(--ink-900);--fg2:var(--ink-500);--fg3:var(--ink-400);
--r-md:10px;--r-lg:14px;--r-pill:999px;
--f:'Inter',-apple-system,sans-serif;--fm:'JetBrains Mono',monospace;
}
body{font-family:var(--f);background:var(--ink-50);color:var(--fg);font-size:15px;min-height:100vh;padding-bottom:32px}
.wrap{max-width:560px;margin:0 auto}
.hdr{background:linear-gradient(135deg,#122F71,#1E4FB8);color:#fff;padding:14px 16px 0;position:sticky;top:0;z-index:100;box-shadow:0 8px 24px rgba(18,47,113,.4)}
.hdr-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.logo{font:800 20px/1.2 var(--f)}.logo span{color:#FFC400}
.logo-sub{font:400 11px/1.4 var(--f);opacity:.75;margin-top:2px}
.back-btn{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:var(--r-pill);padding:6px 12px;color:#fff;font:600 11px/1 var(--f);cursor:pointer;text-decoration:none}
.page-title{padding:8px 0 12px;font:700 13px/1 var(--f);opacity:.9}
.sec{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-lg);padding:16px;margin-bottom:10px}
.sec-title{font:700 13px/1.3 var(--f);color:var(--blu-600);margin-bottom:14px}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:11px}
.fg:last-child{margin-bottom:0}
.fg label{font:600 11px/1 var(--f);color:var(--fg3);text-transform:uppercase;letter-spacing:.04em}
.fg input,.fg select{height:44px;border:1px solid var(--bd2);border-radius:var(--r-md);padding:0 13px;font:400 15px/1 var(--f);color:var(--fg);background:#fff}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--blu-500);box-shadow:0 0 0 3px var(--blu-100)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid2 .fg{margin-bottom:0}
.row-title{font:600 12px/1 var(--f);color:var(--fg2);margin:10px 0 8px;padding-top:8px;border-top:1px solid var(--bd)}
.row-title.first{border-top:none;margin-top:0;padding-top:0}
.btn-calc{width:100%;height:52px;background:linear-gradient(135deg,var(--blu-600),var(--blu-500));color:#fff;border:none;border-radius:var(--r-lg);font:700 15px/1 var(--f);cursor:pointer;margin-top:4px}
.result-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-lg);padding:16px;margin-bottom:10px;display:none}
.result-card.show{display:block}
.result-title{font:700 13px/1 var(--f);color:var(--blu-600);margin-bottom:14px;border-bottom:1px solid var(--bd);padding-bottom:10px}
.sal-box{background:linear-gradient(135deg,#122F71,#1E4FB8);border-radius:var(--r-lg);padding:16px;margin-bottom:14px;color:#fff;text-align:center}
.sal-lbl{font:600 11px/1 var(--f);opacity:.8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.sal-val{font:800 30px/1 var(--fm);color:#FFC400}
.sal-sub{font:600 12px/1 var(--f);opacity:.7;margin-top:4px}
.kpi-row{display:flex;justify-content:center;margin-top:8px}
.kpi-badge{padding:4px 14px;border-radius:var(--r-pill);font:700 12px/1 var(--f)}
.kpi-0{background:var(--red-bg);color:var(--red)}.kpi-07{background:#FFF4E0;color:#b45309}
.kpi-10{background:var(--grn-bg);color:var(--grn)}.kpi-11{background:var(--blu-50);color:var(--blu-600)}
.kpi-13{background:#FFFAE0;color:var(--yel-700);border:1px solid #FFDC4C}
.bt{width:100%;border-collapse:collapse}
.bt tr{border-bottom:1px solid var(--bd)}
.bt tr:last-child{border-bottom:none}
.bt td{padding:7px 4px;font:400 13px/1.4 var(--f);color:var(--fg)}
.bt td:last-child{text-align:right;font:600 12px/1 var(--fm)}
.bt .tr td{font:700 13px/1 var(--f);color:var(--blu-700);padding-top:10px;border-top:2px solid var(--blu-100)}
.bt .tr td:last-child{font:800 13px/1 var(--fm)}
.bt .sub td{font:400 12px/1.4 var(--f);color:var(--fg3)}
.bt .sub td:last-child{font:500 12px/1 var(--fm);color:var(--fg2)}
.bt .sect td{font:600 11px/1 var(--f);color:var(--fg3);padding:10px 4px 6px;text-transform:uppercase;letter-spacing:.04em;border-bottom:none}
.warn{background:var(--red-bg);border:1px solid #fca5a5;border-radius:var(--r-md);padding:9px 12px;font:500 12px/1.5 var(--f);color:var(--red);margin-bottom:8px}
.sch-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:8px}
.sch-cell{background:var(--ink-50);border:1px solid var(--bd);border-radius:8px;padding:5px 2px;text-align:center}
.sch-dn{font:600 9px/1 var(--f);color:var(--fg3);text-transform:uppercase;margin-bottom:2px}
.sch-d{font:700 14px/1 var(--fm);color:var(--fg)}
.sch-s{font:600 8px/1 var(--f);padding:2px 4px;border-radius:99px;margin-top:2px;display:inline-block}
.sw{background:var(--grn-bg);color:var(--grn)}.so{background:var(--ink-100);color:var(--fg3)}.st{background:var(--blu-50);color:var(--blu-600);border:1px solid var(--blu-100)}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-row">
      <div>
        <div class="logo">PHI LONG <span>AUTO</span></div>
        <div class="logo-sub">Tinh luong NVKD — 2026</div>
      </div>
      <a href="index.html" class="back-btn">&larr; Trang chu</a>
    </div>
    <div class="page-title">&#9733; Bang Luong Nhan Vien Kinh Doanh (SALE / NVKD)</div>
  </div>
  <div style="padding:12px">
    <div class="sec">
      <div class="sec-title">&#128100; Thong tin nhan su</div>
      <div class="fg"><label>Ho va ten</label><input id="name" type="text" placeholder="VD: Nguyen Van A"></div>
      <div class="grid2">
        <div class="fg"><label>Chi nhanh</label><input id="branch" type="text" placeholder="VD: CN01"></div>
        <div class="fg"><label>Ky tinh luong</label><input id="period" type="text" placeholder="VD: 6/2026"></div>
      </div>
      <div class="grid2">
        <div class="fg"><label>Ngay cong thuc te</label><input id="workdays" type="number" min="0" max="31" value="26"></div>
        <div class="fg"><label>Ngay cong chuan</label><input type="number" value="26" readonly></div>
      </div>
    </div>
    <div class="sec">
      <div class="sec-title">&#128178; Doanh thu thuc te</div>
      <div class="row-title first">Lop xe (LX)</div>
      <div class="fg"><label>Doanh thu lop xe — VND</label><input id="rev_lx" type="number" min="0" value="0"></div>
      <div class="row-title">SP ngoai lop (SC + PK + BD)</div>
      <div class="grid2">
        <div class="fg"><label>Sua chua (SC)</label><input id="rev_sc" type="number" min="0" value="0"></div>
        <div class="fg"><label>Phu kien (PK)</label><input id="rev_pk" type="number" min="0" value="0"></div>
      </div>
      <div class="fg"><label>Bao duong (BD)</label><input id="rev_bd" type="number" min="0" value="0"></div>
      <div class="fg" style="margin-top:10px"><label>Doanh thu ke hoach (tinh % KPI)</label><input id="rev_plan" type="number" min="0" value="0"></div>
    </div>
    <div class="sec">
      <div class="sec-title">&#11088; Thuong nang suat</div>
      <div class="row-title first">Trong tuan</div>
      <div class="fg"><label>So lop ban/lap tuan cao nhat</label><input id="tires_week" type="number" min="0" value="0"></div>
      <div class="fg"><label>Xe quay dau trong tuan?</label>
        <select id="return_week">
          <option value="0">Khong co xe quay dau ✓</option>
          <option value="1">Co xe quay dau ✗</option>
        </select>
      </div>
      <div class="row-title">Trong thang</div>
      <div class="fg"><label>Tong so lop ca thang</label><input id="tires_month" type="number" min="0" value="0"></div>
      <div class="fg"><label>So xe quay dau trong thang</label>
        <select id="return_month">
          <option value="0">0 xe ✓</option>
          <option value="1">1 xe ✓</option>
          <option value="2">2 xe ✓</option>
          <option value="3">3+ xe ✗</option>
        </select>
      </div>
    </div>
    <button class="btn-calc" onclick="calcSale()">TINH LUONG SALE</button>
    <div class="result-card" id="result">
      <div class="result-title">Ket qua tinh luong SALE</div>
      <div class="sal-box">
        <div class="sal-lbl">TONG LUONG THANG</div>
        <div class="sal-val" id="res-total">0</div>
        <div class="sal-sub">VND</div>
        <div class="kpi-row"><div id="kpibadge" class="kpi-badge kpi-10">KPI x1.0</div></div>
      </div>
      <div id="res-warns"></div>
      <table class="bt"><tbody id="res-rows"></tbody></table>
    </div>
    <div class="sec" style="margin-top:8px">
      <div class="sec-title">&#128197; Lich lam viec thang <span id="calmonth"></span></div>
      <div id="calgrid" class="sch-grid"></div>
    </div>
  </div>
</div>
<script>
function fm(n){n=Math.round(n);return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,'.');}
function kpiCoeff(pct){if(pct<80)return 0;if(pct<90)return 0.7;if(pct<100)return 1.0;if(pct<130)return 1.1;return 1.3;}
function kpiClass(c){if(c===0)return 'kpi-0';if(c===0.7)return 'kpi-07';if(c===1.0)return 'kpi-10';if(c===1.1)return 'kpi-11';return 'kpi-13';}
function kpiLabel(c,pct){
  const map={0:'KPI x0 (<80%)',0.7:'KPI x0.7 (80-90%)',1.0:'KPI x1.0 (90-100%)',1.1:'KPI x1.1 (100-130%)',1.3:'KPI x1.3 (>=130%)'};
  return (map[c]||'KPI x'+c)+' — '+pct.toFixed(1)+'%';
}
function calcSale(){
  const wd=parseFloat(document.getElementById('workdays').value)||26;
  const std=26, pr=wd/std;
  const lx=parseFloat(document.getElementById('rev_lx').value)||0;
  const sc=parseFloat(document.getElementById('rev_sc').value)||0;
  const pk=parseFloat(document.getElementById('rev_pk').value)||0;
  const bd=parseFloat(document.getElementById('rev_bd').value)||0;
  const plan=parseFloat(document.getElementById('rev_plan').value)||0;
  const tw=parseFloat(document.getElementById('tires_week').value)||0;
  const rw=parseInt(document.getElementById('return_week').value)||0;
  const tm=parseFloat(document.getElementById('tires_month').value)||0;
  const rm=parseInt(document.getElementById('return_month').value)||0;
  const ngoai=sc+pk+bd, total=lx+ngoai;
  const pct=plan>0?(total/plan*100):100, kc=kpiCoeff(pct);
  // A. P1
  const base=4200000*pr, xe=260000*pr, com=780000*pr;
  const ythuc=1000000*kc, vitri=650000*kc;
  const p1=base+xe+com+ythuc+vitri;
  // B. Hoa hong luy tien
  let hl=0;
  if(lx<=350e6) hl=lx*0.003;
  else if(lx<=700e6) hl=350e6*0.003+(lx-350e6)*0.005;
  else hl=350e6*0.003+350e6*0.005+(lx-700e6)*0.01;
  let hn=0;
  if(ngoai<=100e6) hn=ngoai*0.005;
  else if(ngoai<=200e6) hn=100e6*0.005+(ngoai-100e6)*0.01;
  else hn=100e6*0.005+100e6*0.01+(ngoai-200e6)*0.02;
  const hh=hl+hn;
  // C. Thuong nang suat
  let bw=0,ww='';
  if(rw>0) ww='Co xe quay dau trong tuan → mat thuong tuan';
  else{if(tw>150)bw=500000;else if(tw>=120)bw=300000;}
  bw*=kc;
  let bm=0,wm='';
  if(rm>2) wm='Vuot 2 xe quay dau trong thang → mat thuong thang';
  else{if(tm>600)bm=2000000;else if(tm>=500)bm=1000000;}
  bm*=kc;
  const bonus=bw+bm, grand=p1+hh+bonus;
  // Render
  document.getElementById('res-total').textContent=fm(grand);
  const kb=document.getElementById('kpibadge');
  kb.className='kpi-badge '+kpiClass(kc);
  kb.textContent=kpiLabel(kc,pct);
  const w=document.getElementById('res-warns');
  w.innerHTML='';
  if(ww) w.innerHTML+='<div class="warn">&#9888; '+ww+'</div>';
  if(wm) w.innerHTML+='<div class="warn">&#9888; '+wm+'</div>';
  document.getElementById('res-rows').innerHTML=
    '<tr class="sect"><td colspan="2">A. THU NHAP CO DINH (P1)</td></tr>'+
    '<tr class="sub"><td>Luong co ban ('+wd+'/'+std+' ngay)</td><td>'+fm(base)+'d</td></tr>'+
    '<tr class="sub"><td>PC xang xe</td><td>'+fm(xe)+'d</td></tr>'+
    '<tr class="sub"><td>PC com trua</td><td>'+fm(com)+'d</td></tr>'+
    '<tr class="sub"><td>Y thuc & trach nhiem (x'+kc+')</td><td>'+fm(ythuc)+'d</td></tr>'+
    '<tr class="sub"><td>Vi tri & vai tro (x'+kc+')</td><td>'+fm(vitri)+'d</td></tr>'+
    '<tr><td><b>Tong P1</b></td><td><b>'+fm(p1)+'d</b></td></tr>'+
    '<tr class="sect"><td colspan="2">B. HOA HONG LUY TIEN</td></tr>'+
    '<tr class="sub"><td>HH lop xe (DT: '+fm(lx)+')</td><td>'+fm(hl)+'d</td></tr>'+
    '<tr class="sub"><td>HH ngoai lop SC+PK+BD ('+fm(ngoai)+')</td><td>'+fm(hn)+'d</td></tr>'+
    '<tr><td><b>Tong hoa hong</b></td><td><b>'+fm(hh)+'d</b></td></tr>'+
    '<tr class="sect"><td colspan="2">C. THUONG NANG SUAT</td></tr>'+
    '<tr class="sub"><td>Thuong tuan ('+tw+' lop'+(rw?' - mat':'')+')</td><td>'+fm(bw)+'d</td></tr>'+
    '<tr class="sub"><td>Thuong thang ('+tm+' lop'+(rm>2?' - mat':'')+')</td><td>'+fm(bm)+'d</td></tr>'+
    '<tr><td><b>Tong thuong NS</b></td><td><b>'+fm(bonus)+'d</b></td></tr>'+
    '<tr class="tr"><td>TONG LUONG</td><td>'+fm(grand)+'d</td></tr>';
  document.getElementById('result').classList.add('show');
  setTimeout(()=>document.getElementById('result').scrollIntoView({behavior:'smooth',block:'start'}),100);
}
function renderCal(){
  const now=new Date(),y=now.getFullYear(),m=now.getMonth();
  document.getElementById('calmonth').textContent=(m+1)+'/'+y;
  const days=new Date(y,m+1,0).getDate(),today=now.getDate();
  const dn=['CN','T2','T3','T4','T5','T6','T7'];
  let h='';
  for(let d=1;d<=days;d++){
    const dow=new Date(y,m,d).getDay(),off=dow===0,td=d===today;
    const cls=td?'st':(off?'so':'sw');
    const lbl=td?'HOM NAY':(off?'NGHI':'LAM');
    h+='<div class="sch-cell"><div class="sch-dn">'+dn[dow]+'</div><div class="sch-d">'+d+'</div><div class="sch-s '+cls+'">'+lbl+'</div></div>';
  }
  document.getElementById('calgrid').innerHTML=h;
}
renderCal();
</script>
</body>
</html>
